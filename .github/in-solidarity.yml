# I (MaxTheMooshroom) put several hours into researching for this file. Please reach out if anything could use improvement!
rules:
  master:
    level: failure
    alternatives:
      - main
      - original
      - controller
    message: >
      Please consider an alternative to `{{match}}`.
      {{#if alternatives~}}

      Possibilities include: {{#each alternatives}}{{#if @index}}, {{/if}}`{{this}}`{{/each}}
      {{~/if}}

      For more information, see:
      - https://inclusivenaming.org/word-lists/tier-1/_master/
      - https://github.com/IBM/IBMInclusiveITLanguage/blob/main/README.md
  slave:
    level: failure
    alternatives:
      - peripheral
      - worker
    message: >
      Please consider an alternative to `{{match}}`.
      {{#if alternatives~}}

      Possibilities include: {{#each alternatives}}{{#if @index}}, {{/if}}`{{this}}`{{/each}}
      {{~/if}}

      For more information, see:
      - https://inclusivenaming.org/word-lists/tier-1/_master-slave/
      - https://github.com/IBM/IBMInclusiveITLanguage/blob/main/README.md
  whitelist:
    level: failure
    alternatives:
      - allowlist
      - allow-list
    message: >
      Please consider an alternative to `{{match}}`.
      {{#if alternatives~}}

      Possibilities include: {{#each alternatives}}{{#if @index}}, {{/if}}`{{this}}`{{/each}}
      {{~/if}}

      For more information, see:
      - https://inclusivenaming.org/word-lists/tier-1/whitelist/
      - https://github.com/IBM/IBMInclusiveITLanguage/blob/main/README.md
  blacklist:
    level: failure
    alternatives:
      - denylist
      - deny-list
    message: >
      Please consider an alternative to `{{match}}`.
      {{#if alternatives~}}

      Possibilities include: {{#each alternatives}}{{#if @index}}, {{/if}}`{{this}}`{{/each}}
      {{~/if}}

      For more information, see:
      - https://inclusivenaming.org/word-lists/tier-1/whitelist/
      - https://github.com/IBM/IBMInclusiveITLanguage/blob/main/README.md
  grandfathered:
    level: failure
    alternatives:
      - legacy
      - exempted
    message: >
      Please consider an alternative to `{{match}}`.
      {{#if alternatives~}}

      Possibilities include: {{#each alternatives}}{{#if @index}}, {{/if}}`{{this}}`{{/each}}
      {{~/if}}

      For more information, see:
      - https://inclusivenaming.org/word-lists/tier-1/grandfathered/
      - https://www.npr.org/sections/codeswitch/2013/10/21/239081586/the-racial-history-of-the-grandfather-clause
  sanity_check:
    level: failure
    alternatives:
      - coherence check
      - redundancy check
      - verification of assumption(s)
    message: >
      Please consider an alternative to `{{match}}`.
      {{#if alternatives~}}

      Possibilities include: {{#each alternatives}}{{#if @index}}, {{/if}}`{{this}}`{{/each}}
      {{~/if}}

      For more information, see:
      - https://inclusivenaming.org/word-lists/tier-2/sanity-check/
  man_hours:
    level: failure
    alternatives:
      - work-hours
      - staff-hours
    message: >
      Please consider an alternative to `{{match}}`.
      {{#if alternatives~}}

      Possibilities include: {{#each alternatives}}{{#if @index}}, {{/if}}`{{this}}`{{/each}}
      {{~/if}}

      For more information, see:
      - https://www.un.org/en/gender-inclusive-language/guidelines.shtml
      - https://github.com/IBM/IBMInclusiveITLanguage/blob/main/README.md
